<svg xmlns="http://w3.org" width="300" height="40" viewBox="0 0 300 40">
  <style>
    .text {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      font-size: 24px;
      fill: #24292f;
      white-space: nowrap;
      overflow: hidden;
      border-right: 3px solid #58a6ff;
      width: 0;
      animation: typing 4s steps(19, end) infinite, blink-caret 0.75s step-end infinite;
    }

    @media (prefers-color-scheme: dark) {
      .text {
        fill: #c9d1d9;
      }
    }

    @keyframes typing {
      0%, 10% { width: 0 }
      70%, 90% { width: 100% }
      100% { width: 0 }
    }

    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: #58a6ff; }
    }
  </style>
  <foreignObject width="100%" height="100%">
    <div xmlns="http://w3.org" class="text">
      Hi, I'm Merryheart
    </div>
  </foreignObject>
</svg>
